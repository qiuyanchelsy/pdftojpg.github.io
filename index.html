<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 轉 JPG / PNG 線上工具 - 100% 本地安全轉換</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- JSZip for downloading all files as ZIP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0284c7',
              600: '#0369a1',
              700: '#075985',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* 自訂捲軸樣式 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #374151;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-full flex flex-col transition-colors duration-200">

  <!-- 導覽列 -->
  <header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 px-6 py-4 sticky top-0 z-50 transition-colors">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="p-2.5 bg-red-100 dark:bg-red-950/50 text-red-600 dark:text-red-400 rounded-xl">
          <i data-lucide="file-image" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-tight">PDF 轉圖片快手</h1>
          <p class="text-xs text-slate-500 dark:text-slate-400">100% 瀏覽器本地安全轉換，您的資料絕不上傳伺服器</p>
        </div>
      </div>
      
      <div class="flex items-center space-x-3">
        <!-- 說明提示 -->
        <span class="hidden md:inline-flex items-center text-xs bg-green-50 dark:bg-green-950/30 text-green-700 dark:text-green-400 px-2.5 py-1 rounded-full font-medium border border-green-200 dark:border-green-900/30">
          <i data-lucide="shield-check" class="w-3.5 h-3.5 mr-1"></i> 隱私安全保護中
        </span>
        <!-- 深色模式切換 -->
        <button id="themeToggle" class="p-2 text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition">
          <i id="themeIcon" data-lucide="moon" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- 主要內容區 -->
  <main class="flex-grow max-w-6xl w-full mx-auto p-4 md:p-6 flex flex-col gap-6">
    
    <!-- 1. 上傳與設定面板 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- 上傳區域 (佔 2 欄) -->
      <div class="lg:col-span-2">
        <div id="dropzone" class="border-2 border-dashed border-slate-300 dark:border-slate-700 hover:border-primary-500 dark:hover:border-primary-500 bg-white dark:bg-slate-950 rounded-2xl p-8 text-center flex flex-col items-center justify-center min-h-[280px] cursor-pointer transition group">
          <input type="file" id="pdfFileInput" accept=".pdf" class="hidden">
          
          <div class="p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl group-hover:scale-110 transition duration-300 mb-4">
            <i data-lucide="upload-cloud" class="w-10 h-10 text-slate-400 dark:text-slate-500 group-hover:text-primary-500 transition"></i>
          </div>
          
          <h3 class="text-lg font-semibold mb-1">將 PDF 檔案拖曳至此處</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">或點擊此區域選擇檔案</p>
          <button class="px-5 py-2.5 bg-primary-500 hover:bg-primary-600 active:scale-95 text-white text-sm font-semibold rounded-xl shadow-lg shadow-primary-500/20 transition">
            選取檔案
          </button>
          <p class="text-xs text-slate-400 dark:text-slate-500 mt-4">支援單一 PDF 檔案，無大小限制</p>
        </div>

        <!-- 檔案基本資訊 (預設隱藏) -->
        <div id="fileInfoPanel" class="hidden mt-4 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-4 flex items-center justify-between">
          <div class="flex items-center space-x-3 min-w-0">
            <div class="p-2 bg-red-50 dark:bg-red-950/20 text-red-600 dark:text-red-400 rounded-lg shrink-0">
              <i data-lucide="file-text" class="w-5 h-5"></i>
            </div>
            <div class="truncate">
              <h4 id="infoFileName" class="text-sm font-semibold truncate">檔名.pdf</h4>
              <p id="infoFileDetails" class="text-xs text-slate-500">大小: - | 總頁數: -</p>
            </div>
          </div>
          <button id="clearFileBtn" class="p-2 text-slate-400 hover:text-red-500 dark:hover:text-red-400 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-900 transition">
            <i data-lucide="trash-2" class="w-5 h-5"></i>
          </button>
        </div>
      </div>

      <!-- 設定面板 -->
      <div class="bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 flex flex-col justify-between">
        <div>
          <h3 class="text-base font-bold mb-4 flex items-center">
            <i data-lucide="sliders" class="w-4 h-4 mr-2 text-primary-500"></i> 轉換設定
          </h3>
          
          <!-- 格式選擇 -->
          <div class="mb-5">
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">輸出格式</label>
            <div class="grid grid-cols-2 gap-2">
              <label class="relative flex items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-900 transition checked-sibling:border-primary-500">
                <input type="radio" name="format" value="jpeg" checked class="sr-only peer">
                <span class="text-sm font-semibold peer-checked:text-primary-500">JPG (JPEG)</span>
                <div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary-500 pointer-events-none"></div>
              </label>
              <label class="relative flex items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-900 transition checked-sibling:border-primary-500">
                <input type="radio" name="format" value="png" class="sr-only peer">
                <span class="text-sm font-semibold peer-checked:text-primary-500">PNG</span>
                <div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary-500 pointer-events-none"></div>
              </label>
            </div>
          </div>

          <!-- 解析度選擇 (Scale) -->
          <div class="mb-5">
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">圖片解析度 (DPI)</label>
            <div class="grid grid-cols-3 gap-2">
              <label class="relative flex flex-col items-center justify-center p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-900 transition">
                <input type="radio" name="resolution" value="1" class="sr-only peer">
                <span class="text-sm font-bold peer-checked:text-primary-500">1x</span>
                <span class="text-[10px] text-slate-400">標準速度快</span>
                <div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary-500 pointer-events-none"></div>
              </label>
              <label class="relative flex flex-col items-center justify-center p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-900 transition">
                <input type="radio" name="resolution" value="2" checked class="sr-only peer">
                <span class="text-sm font-bold peer-checked:text-primary-500">2x</span>
                <span class="text-[10px] text-slate-400">高清 (推薦)</span>
                <div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary-500 pointer-events-none"></div>
              </label>
              <label class="relative flex flex-col items-center justify-center p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-900 transition">
                <input type="radio" name="resolution" value="3" class="sr-only peer">
                <span class="text-sm font-bold peer-checked:text-primary-500">3x</span>
                <span class="text-[10px] text-slate-400">超高解析</span>
                <div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary-500 pointer-events-none"></div>
              </label>
            </div>
          </div>

          <!-- 壓縮品質 (僅JPG適用) -->
          <div id="qualitySection" class="mb-4">
            <div class="flex justify-between items-center mb-2">
              <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">壓縮品質</label>
              <span id="qualityVal" class="text-xs font-bold text-primary-500">90%</span>
            </div>
            <input type="range" id="qualityRange" min="10" max="100" value="90" class="w-full h-1.5 bg-slate-200 dark:bg-slate-800 rounded-lg appearance-none cursor-pointer accent-primary-500">
            <div class="flex justify-between text-[10px] text-slate-400 mt-1">
              <span>高壓縮 (小檔案)</span>
              <span>高畫質 (大檔案)</span>
            </div>
          </div>
        </div>

        <!-- 觸發轉換按鈕 -->
        <div class="mt-6">
          <button id="convertBtn" disabled class="w-full py-3.5 bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600 font-bold rounded-xl cursor-not-allowed transition flex items-center justify-center space-x-2">
            <i data-lucide="zap" class="w-5 h-5"></i>
            <span>開始轉換頁面</span>
          </button>
        </div>
      </div>

    </div>

    <!-- 2. 轉換狀態 & 載入條 -->
    <div id="progressContainer" class="hidden bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
      <div class="flex justify-between items-center mb-3">
        <div class="flex items-center space-x-3">
          <div class="animate-spin text-primary-500">
            <i data-lucide="loader-2" class="w-5 h-5"></i>
          </div>
          <span id="progressText" class="font-semibold text-sm">正在讀取 PDF 內容...</span>
        </div>
        <span id="progressPercent" class="text-xs font-bold text-primary-500 bg-primary-50 dark:bg-primary-950/40 px-2.5 py-1 rounded-full">0%</span>
      </div>
      <div class="w-full bg-slate-100 dark:bg-slate-900 rounded-full h-2.5 overflow-hidden">
        <div id="progressBar" class="bg-primary-500 h-full w-0 rounded-full transition-all duration-300"></div>
      </div>
    </div>

    <!-- 3. 結果與預覽面板 (預設隱藏) -->
    <div id="resultsPanel" class="hidden flex-grow flex flex-col gap-6">
      
      <!-- 工具列 -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-4">
        <div>
          <h3 class="font-bold flex items-center text-slate-800 dark:text-slate-100">
            <i data-lucide="image" class="w-5 h-5 mr-2 text-primary-500"></i> 已生成圖片列表
          </h3>
          <p class="text-xs text-slate-500 dark:text-slate-400">您可以逐頁預覽、單獨下載或一次打包下載</p>
        </div>
        <div class="flex items-center gap-2">
          <!-- 一鍵打包 ZIP -->
          <button id="downloadZipBtn" class="flex-grow sm:flex-none px-5 py-2.5 bg-primary-500 hover:bg-primary-600 text-white font-bold text-sm rounded-xl flex items-center justify-center space-x-2 shadow-lg shadow-primary-500/10 transition active:scale-95">
            <i data-lucide="folder-archive" class="w-4 h-4"></i>
            <span>下載全部 (ZIP)</span>
          </button>
        </div>
      </div>

      <!-- 圖片網格 -->
      <div id="previewGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- 圖片卡片樣板 -->
      </div>
    </div>

  </main>

  <!-- 頁尾 -->
  <footer class="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950/50 py-6 text-center text-xs text-slate-500 dark:text-slate-400 transition-colors">
    <div class="max-w-6xl mx-auto px-4">
      <p>© 2026 PDF 轉圖片快手. 使用本機瀏覽器運算能力，提供最高隱私的安全轉換環境。</p>
    </div>
  </footer>

  <!-- 提示浮窗 (Toast) -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 bg-slate-900 text-white dark:bg-white dark:text-slate-900 px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-2 translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
    <i id="toastIcon" data-lucide="info" class="w-4 h-4 text-primary-500"></i>
    <span id="toastMessage" class="text-sm font-medium">提示訊息</span>
  </div>

  <!-- 燈箱預覽 (Modal) -->
  <div id="previewModal" class="fixed inset-0 z-50 bg-black/85 backdrop-blur-sm hidden flex-col items-center justify-center p-4">
    <div class="absolute top-4 right-4 flex items-center space-x-3">
      <a id="modalDownloadLink" download class="p-2.5 bg-white/10 hover:bg-white/20 text-white rounded-full transition">
        <i data-lucide="download" class="w-6 h-6"></i>
      </a>
      <button id="closeModalBtn" class="p-2.5 bg-white/10 hover:bg-white/20 text-white rounded-full transition">
        <i data-lucide="x" class="w-6 h-6"></i>
      </button>
    </div>
    <div class="max-w-4xl max-h-[85vh] w-full h-full flex items-center justify-center">
      <img id="modalImg" src="" alt="預覽圖片" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">
    </div>
    <div id="modalTitle" class="mt-4 text-white text-sm font-semibold bg-black/40 px-4 py-1.5 rounded-full">頁面 1</div>
  </div>

  <!-- 核心邏輯 JavaScript -->
  <script>
    // 初始化 PDF.js 核心
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // DOM 元素引用
    const dropzone = document.getElementById('dropzone');
    const pdfFileInput = document.getElementById('pdfFileInput');
    const fileInfoPanel = document.getElementById('fileInfoPanel');
    const infoFileName = document.getElementById('infoFileName');
    const infoFileDetails = document.getElementById('infoFileDetails');
    const clearFileBtn = document.getElementById('clearFileBtn');
    
    const qualitySection = document.getElementById('qualitySection');
    const qualityRange = document.getElementById('qualityRange');
    const qualityVal = document.getElementById('qualityVal');
    const convertBtn = document.getElementById('convertBtn');
    
    const progressContainer = document.getElementById('progressContainer');
    const progressText = document.getElementById('progressText');
    const progressPercent = document.getElementById('progressPercent');
    const progressBar = document.getElementById('progressBar');

    const resultsPanel = document.getElementById('resultsPanel');
    const previewGrid = document.getElementById('previewGrid');
    const downloadZipBtn = document.getElementById('downloadZipBtn');

    // 預覽 Modal 元素
    const previewModal = document.getElementById('previewModal');
    const modalImg = document.getElementById('modalImg');
    const modalTitle = document.getElementById('modalTitle');
    const modalDownloadLink = document.getElementById('modalDownloadLink');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // 狀態變數
    let currentFile = null;
    let pdfDoc = null;
    let renderedImages = []; // 儲存已轉好的 base64/blob 圖片資料

    // 初始化 Lucide 圖標
    lucide.createIcons();

    // 1. 深色模式與主題切換
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    
    // 初始化主題
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
      updateThemeIcon(true);
    } else {
      document.documentElement.classList.remove('dark');
      updateThemeIcon(false);
    }

    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeIcon(isDark);
    });

    function updateThemeIcon(isDark) {
      themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
      lucide.createIcons();
    }

    // 2. 檔案格式選擇監聽 (PNG 無需壓縮品質設定)
    const formatRadios = document.querySelectorAll('input[name="format"]');
    formatRadios.forEach(radio => {
      radio.addEventListener('change', (e) => {
        if (e.target.value === 'png') {
          qualitySection.classList.add('opacity-40', 'pointer-events-none');
        } else {
          qualitySection.classList.remove('opacity-40', 'pointer-events-none');
        }
      });
    });

    qualityRange.addEventListener('input', (e) => {
      qualityVal.textContent = e.target.value + '%';
    });

    // 3. 拖放上傳邏輯
    dropzone.addEventListener('click', () => pdfFileInput.click());
    
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('border-primary-500', 'bg-primary-50/20', 'dark:bg-primary-950/10');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('border-primary-500', 'bg-primary-50/20', 'dark:bg-primary-950/10');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('border-primary-500', 'bg-primary-50/20', 'dark:bg-primary-950/10');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFileSelect(files[0]);
      }
    });

    pdfFileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFileSelect(e.target.files[0]);
      }
    });

    // 處理檔案讀取
    function handleFileSelect(file) {
      if (file.type !== 'application/pdf' && !file.name.endsWith('.pdf')) {
        showToast('請上傳正確的 PDF 格式檔案', 'alert-circle');
        return;
      }

      currentFile = file;
      infoFileName.textContent = file.name;
      
      const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);
      infoFileDetails.textContent = `檔案大小: ${fileSizeMB} MB | 正在讀取中...`;

      // 顯示檔案資訊面板，隱藏拖放區
      fileInfoPanel.classList.remove('hidden');
      dropzone.classList.add('hidden');

      // 讀取 PDF 頁數
      const fileReader = new FileReader();
      fileReader.onload = async function() {
        try {
          const typedarray = new Uint8Array(this.result);
          pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
          infoFileDetails.textContent = `檔案大小: ${fileSizeMB} MB | 總頁數: ${pdfDoc.numPages} 頁`;
          
          // 啟用轉換按鈕
          convertBtn.removeAttribute('disabled');
          convertBtn.className = "w-full py-3.5 bg-primary-500 hover:bg-primary-600 active:scale-95 text-white font-bold rounded-xl shadow-lg shadow-primary-500/20 cursor-pointer transition flex items-center justify-center space-x-2";
          
          showToast('PDF 載入成功，設定後即可開始轉換！', 'check-circle');
        } catch (error) {
          console.error(error);
          showToast('無法解析此 PDF 檔案，可能已損毀或加密', 'alert-circle');
          resetApp();
        }
      };
      fileReader.readAsArrayBuffer(file);
    }

    // 清除選擇檔案
    clearFileBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      resetApp();
    });

    function resetApp() {
      currentFile = null;
      pdfDoc = null;
      renderedImages = [];
      pdfFileInput.value = '';
      
      fileInfoPanel.classList.add('hidden');
      dropzone.classList.remove('hidden');
      resultsPanel.classList.add('hidden');
      progressContainer.classList.add('hidden');
      
      convertBtn.setAttribute('disabled', 'true');
      convertBtn.className = "w-full py-3.5 bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600 font-bold rounded-xl cursor-not-allowed transition flex items-center justify-center space-x-2";
    }

    // 4. 開始轉換核心邏輯
    convertBtn.addEventListener('click', async () => {
      if (!pdfDoc) return;

      // 重設狀態
      renderedImages = [];
      previewGrid.innerHTML = '';
      resultsPanel.classList.add('hidden');
      progressContainer.classList.remove('hidden');
      
      // 禁用轉換按鈕防止重複點擊
      convertBtn.setAttribute('disabled', 'true');
      const originalBtnClass = convertBtn.className;
      convertBtn.className = "w-full py-3.5 bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600 font-bold rounded-xl cursor-not-allowed transition flex items-center justify-center space-x-2";

      // 取得設定參數
      const selectedFormat = document.querySelector('input[name="format"]:checked').value;
      const selectedScale = parseFloat(document.querySelector('input[name="resolution"]:checked').value);
      const selectedQuality = parseFloat(qualityRange.value) / 100;
      const mimeType = selectedFormat === 'png' ? 'image/png' : 'image/jpeg';
      const fileExt = selectedFormat === 'png' ? '.png' : '.jpg';

      const totalPages = pdfDoc.numPages;

      try {
        // 逐頁渲染 PDF (避免過度消耗系統資源，採取序列渲染)
        for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
          updateProgress(
            Math.round(((pageNum - 1) / totalPages) * 100), 
            `正在渲染第 ${pageNum} / ${totalPages} 頁...`
          );

          // 獲取 PDF 頁面
          const page = await pdfDoc.getPage(pageNum);
          
          // 計算縮放尺寸
          const viewport = page.getViewport({ scale: selectedScale });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          // 渲染設定
          const renderContext = {
            canvasContext: context,
            viewport: viewport
          };
          
          await page.render(renderContext).promise;

          // 導出為圖片 DataURL
          const imgDataUrl = canvas.toDataURL(mimeType, selectedQuality);
          
          // 儲存至陣列
          renderedImages.push({
            pageNum: pageNum,
            dataUrl: imgDataUrl,
            fileName: `${getFileBaseName(currentFile.name)}_page_${pageNum}${fileExt}`
          });

          // 即時在預覽區創建卡片
          createPreviewCard(pageNum, imgDataUrl, renderedImages[pageNum - 1].fileName);
        }

        updateProgress(100, '轉換完成！');
        
        // 延遲隱藏進度條，顯示成果區
        setTimeout(() => {
          progressContainer.classList.add('hidden');
          resultsPanel.classList.remove('hidden');
          
          // 滾動到預覽區域
          resultsPanel.scrollIntoView({ behavior: 'smooth' });
          
          // 恢復按鈕狀態
          convertBtn.removeAttribute('disabled');
          convertBtn.className = originalBtnClass;
          
          showToast(`成功轉換 ${totalPages} 個頁面！`, 'check');
        }, 600);

      } catch (error) {
        console.error(error);
        showToast('渲染過程中發生錯誤，請重試。', 'alert-triangle');
        
        progressContainer.classList.add('hidden');
        convertBtn.removeAttribute('disabled');
        convertBtn.className = originalBtnClass;
      }
    });

    // 建立預覽卡片
    function createPreviewCard(pageNum, imgDataUrl, fileName) {
      const card = document.createElement('div');
      card.className = "bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition flex flex-col group";
      
      card.innerHTML = `
        <!-- 圖片縮圖區 -->
        <div class="relative aspect-[3/4] bg-slate-100 dark:bg-slate-900 overflow-hidden cursor-zoom-in group-hover:opacity-95 transition">
          <img src="${imgDataUrl}" alt="第 ${pageNum} 頁" class="w-full h-full object-contain p-2" loading="lazy">
          <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
            <span class="p-2 bg-white/20 hover:bg-white/40 text-white rounded-full transition backdrop-blur-sm">
              <i data-lucide="zoom-in" class="w-5 h-5"></i>
            </span>
          </div>
          <!-- 頁數標籤 -->
          <span class="absolute top-3 left-3 bg-slate-900/80 backdrop-blur-sm text-white text-xs font-semibold px-2.5 py-1 rounded-lg">
            頁面 ${pageNum}
          </span>
        </div>
        
        <!-- 操作區 -->
        <div class="p-3 border-t border-slate-100 dark:border-slate-900 flex flex-col gap-2 bg-slate-50/50 dark:bg-slate-950/50">
          <p class="text-[10px] text-slate-400 dark:text-slate-500 font-mono truncate" title="${fileName}">${fileName}</p>
          <a href="${imgDataUrl}" download="${fileName}" class="w-full py-2 bg-white hover:bg-slate-100 dark:bg-slate-900 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-slate-800 font-semibold text-xs rounded-lg flex items-center justify-center space-x-1.5 transition active:scale-[0.98]">
            <i data-lucide="download" class="w-3.5 h-3.5"></i>
            <span>下載單頁</span>
          </a>
        </div>
      `;

      // 點擊預覽大圖
      const previewTrigger = card.querySelector('.cursor-zoom-in');
      previewTrigger.addEventListener('click', () => {
        openModal(imgDataUrl, `第 ${pageNum} 頁 - ${fileName}`, imgDataUrl, fileName);
      });

      previewGrid.appendChild(card);
      // 更新新卡片內部的 Lucide 圖標
      lucide.createIcons();
    }

    // 5. ZIP 打包下載全部
    downloadZipBtn.addEventListener('click', async () => {
      if (renderedImages.length === 0) return;

      // 變更按鈕載入狀態
      downloadZipBtn.setAttribute('disabled', 'true');
      const originalText = downloadZipBtn.innerHTML;
      downloadZipBtn.innerHTML = `
        <div class="animate-spin text-white">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </div>
        <span>正在打包圖片 ZIP...</span>
      `;

      try {
        const zip = new JSZip();
        
        renderedImages.forEach(img => {
          // dataUrl 格式: "data:image/jpeg;base64,...." -> 取出 base64 字串部分
          const base64Data = img.dataUrl.split(',')[1];
          zip.file(img.fileName, base64Data, { base64: true });
        });

        const content = await zip.generateAsync({ type: "blob" });
        
        // 觸發下載
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `${getFileBaseName(currentFile.name)}_images.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        showToast('打包下載完成！', 'check');
      } catch (error) {
        console.error(error);
        showToast('ZIP 打包失敗，請嘗試單獨下載圖片。', 'alert-triangle');
      } finally {
        downloadZipBtn.removeAttribute('disabled');
        downloadZipBtn.innerHTML = originalText;
      }
    });

    // 6. 輔助函式與 UI 模組
    function updateProgress(percentage, text) {
      progressBar.style.width = percentage + '%';
      progressPercent.textContent = percentage + '%';
      progressText.textContent = text;
    }

    // 取得不含副檔名的主檔名
    function getFileBaseName(filename) {
      return filename.substring(0, filename.lastIndexOf('.')) || filename;
    }

    // 提示訊息彈窗
    function showToast(message, iconName = 'info') {
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastMessage');
      const toastIcon = document.getElementById('toastIcon');

      toastText.textContent = message;
      toastIcon.setAttribute('data-lucide', iconName);
      lucide.createIcons();

      // 顯示
      toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
      
      // 三秒後自動消失
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
      }, 3000);
    }

    // 燈箱 (Modal) 控制
    function openModal(imgSrc, title, downloadUrl, downloadName) {
      modalImg.src = imgSrc;
      modalTitle.textContent = title;
      modalDownloadLink.href = downloadUrl;
      modalDownloadLink.download = downloadName;
      
      previewModal.classList.remove('hidden');
      previewModal.classList.add('flex');
      document.body.style.overflow = 'hidden'; // 防止底層捲動
    }

    function closeModal() {
      previewModal.classList.add('hidden');
      previewModal.classList.remove('flex');
      document.body.style.overflow = '';
      modalImg.src = ''; // 清空記憶體
    }

    closeModalBtn.addEventListener('click', closeModal);
    previewModal.addEventListener('click', (e) => {
      if (e.target === previewModal || e.target.id === 'previewModal') {
        closeModal();
      }
    });

    // ESC 鍵關閉 Modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

  </script>
</body>
</html>
